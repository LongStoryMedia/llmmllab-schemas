$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: LearnedLimits
description: "Learned maximum limits from successful configurations"
properties:
  max_context:
    type: integer
    minimum: 1
    description: "Maximum context window size learned"
  max_batch:
    type: integer
    minimum: 1
    description: "Maximum batch size learned"
  max_gpu_layers:
    type: integer
    minimum: -1
    description: "Maximum GPU layers learned"
  context_95th_percentile:
    type: integer
    minimum: 1
    description: "95th percentile of successful context sizes"
  batch_95th_percentile:
    type: integer
    minimum: 1
    description: "95th percentile of successful batch sizes"
  gpu_layers_95th_percentile:
    type: integer
    minimum: -1
    description: "95th percentile of successful GPU layer counts"
required:
  - max_context
  - max_batch
  - max_gpu_layers
  - context_95th_percentile
  - batch_95th_percentile
  - gpu_layers_95th_percentile
additionalProperties: false
