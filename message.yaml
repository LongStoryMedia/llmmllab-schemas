$schema: http://json-schema.org/draft-07/schema#
title: Message
description: Message represents a single exchange in the conversation
type: object
properties:
  role:
    $ref: message_role.yaml
    description: Role of the message sender (e.g., user, assistant)
  content:
    type: array
    items:
      $ref: message_content.yaml
    description: Content of the message
  id:
    type: integer
    description: Unique identifier for the message
  created_at:
    type: string
    format: date-time
    description: Timestamp of when the message was created
  conversation_id:
    type: integer
    description: Unique identifier for the conversation
  thoughts:
    type: array
    items:
      $ref: thought.yaml
    description: Array of thoughts or reasoning processes from the assistant
  tool_calls:
    type: array
    items:
      $ref: tool_call.yaml
    description: Array of tool calls associated with the message
  analyses:
    type: array
    items:
      $ref: intent_analysis.yaml
    description: Array of intent analyses associated with the message
  documents:
    type: array
    items:
      $ref: document.yaml
    description: Array of documents attached to the message
  structured_output:
    type: object
    description: Structured output data from the message
required:
  - role
  - content
