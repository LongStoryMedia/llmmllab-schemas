$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: Thought
description: "Represents a thought or reasoning process from an AI assistant"
properties:
  id:
    type: integer
    description: "Unique identifier for the thought"
  message_id:
    type: integer
    description: "Foreign key reference to the associated message"
  text:
    type: string
    description: "The thinking/reasoning content"
  created_at:
    type: string
    format: date-time
    description: "Timestamp when the thought was created"
required:
  - text
additionalProperties: false
