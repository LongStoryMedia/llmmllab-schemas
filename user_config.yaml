$schema: http://json-schema.org/draft-07/schema#
title: UserConfig
description: User-specific configuration
type: object
properties:
  user_id:
    type: string
    description: User ID
  summarization:
    $ref: summarization_config.yaml
  memory:
    $ref: memory_config.yaml
  model_profiles:
    $ref: model_profile_config.yaml
  image_generation:
    $ref: image_generation_config.yaml
  circuit_breaker:
    $ref: circuit_breaker_config.yaml
  gpu_config:
    $ref: gpu_config.yaml
  parameter_optimization:
    $ref: parameter_optimization_config.yaml
  workflow:
    $ref: workflow_config.yaml
  tool:
    $ref: tool_config.yaml
  event_stream:
    $ref: event_stream_config.yaml
  preferences:
    $ref: preferences_config.yaml
required:
  - user_id
  - circuit_breaker
  - gpu_config
  - workflow
  - parameter_optimization
