$schema: http://json-schema.org/draft-07/schema#
title: ThinkingConfig
description: Extended thinking configuration (beta).
type: object
properties:
  type:
    type: string
    enum:
      - enabled
      - disabled
      - adaptive
  budget_tokens:
    type: integer
    minimum: 1024
    description: Maximum tokens to spend on thinking. Required when enabled.
required:
  - type
additionalProperties: false
