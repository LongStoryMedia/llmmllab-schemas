$schema: http://json-schema.org/draft-07/schema#
title: ServerTool
description: An Anthropic-managed server-side tool.
type: object
properties:
  type:
    type: string
    description: "Versioned tool type, e.g. `web_search_20250305`, `text_editor_20250124`, `bash_20250124`, `computer_20250124`."
  name:
    type: string
    description: Optional override name for the tool.
required:
  - type
additionalProperties: false
