$schema: http://json-schema.org/draft-07/schema#
title: ToolChoice
description: Tool selection that the assistant should honor when executing the item.
oneOf:
  - type: object
    properties:
      type:
        type: string
        enum:
          - auto
    required:
      - type
    additionalProperties: false
  - type: object
    properties:
      type:
        type: string
        enum:
          - any
    required:
      - type
    additionalProperties: false
  - type: object
    properties:
      type:
        type: string
        enum:
          - tool
      name:
        type: string
    required:
      - type
      - name
    additionalProperties: false
  - type: object
    properties:
      type:
        type: string
        enum:
          - none
    required:
      - type
    additionalProperties: false
