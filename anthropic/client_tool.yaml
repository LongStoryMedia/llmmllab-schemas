$schema: http://json-schema.org/draft-07/schema#
title: ClientTool
description: A client-side tool definition.
type: object
properties:
  type:
    type: string
    enum:
      - custom
    description: "Omit or set to `custom` for client tools."
  name:
    type: string
    description: Tool name (used by the model when calling the tool).
  description:
    type: string
    description: Detailed description of what the tool does.
  input_schema:
    $ref: input_schema.yaml
    description: JSON Schema for the tool's input.
  cache_control:
    $ref: cache_control.yaml
required:
  - name
  - input_schema
additionalProperties: false
