$schema: http://json-schema.org/draft-07/schema#
title: DocumentContentBlock
type: object
properties:
  type:
    type: string
    enum:
      - document
  source:
    $ref: document_source.yaml
  title:
    type: string
    description: Optional title for the document.
  context:
    type: string
    description: Optional context/description for the document.
  cache_control:
    $ref: cache_control.yaml
required:
  - type
  - source
additionalProperties: false
