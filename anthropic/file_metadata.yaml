$schema: http://json-schema.org/draft-07/schema#
title: FileMetadata
type: object
properties:
  id:
    type: string
    description: "File identifier (`file_…`)."
  type:
    type: string
    enum:
      - file
  filename:
    type: string
  size:
    type: integer
    description: File size in bytes.
  created_at:
    type: string
    format: date-time
  purpose:
    type: string
    description: Intended use of the file.
required:
  - id
  - type
  - filename
  - size
  - created_at
additionalProperties: false
