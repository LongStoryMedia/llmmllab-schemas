$schema: http://json-schema.org/draft-07/schema#
title: ErrorDetail
type: object
properties:
  type:
    type: string
    enum:
      - invalid_request_error
      - authentication_error
      - permission_error
      - not_found_error
      - request_too_large
      - rate_limit_error
      - api_error
      - overloaded_error
  message:
    type: string
required:
  - type
  - message
additionalProperties: false
