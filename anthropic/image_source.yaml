$schema: http://json-schema.org/draft-07/schema#
title: ImageSource
type: object
properties:
  type:
    type: string
    enum:
      - base64
      - url
      - file
  media_type:
    type: string
    enum:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
    description: "Required when type is `base64`."
  data:
    type: string
    description: "Base64-encoded image data. Required when type is `base64`."
  url:
    type: string
    format: uri
    description: "URL of the image. Required when type is `url`."
  file_id:
    type: string
    description: "File ID from the Files API. Required when type is `file`."
required:
  - type
additionalProperties: false
